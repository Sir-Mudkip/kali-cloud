# Reload
unbind r
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-window-option -g renumber-windows on

# Terminal colours
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -s escape-time 0
set-window-option -g mode-keys vi

# Mouse support
set -g mouse on

# Pane management - open in current directory
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# vim-like pane resizing
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Status bar
set-option -g status-position bottom

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "midnight_dark"
set -g @oasis_mode_format "custom"
set -g @oasis_mode_custom_normal "KALI"
set -g @oasis_mode_custom_command "KALI"
set -g @oasis_mode_custom_copy "KALI"
set -g @oasis_mode_custom_view "KALI"
set -g @oasis_mode_custom_choose "KALI"
set -g @oasis_mode_custom_options "KALI"
set -g @oasis_mode_custom_clock "KALI"
set -g @oasis_mode_custom_zoom "KALI"

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
